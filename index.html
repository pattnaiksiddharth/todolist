<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a2e;
      --ink2: #4a4a6a;
      --ink3: #8888aa;
      --paper: #f8f7f2;
      --paper2: #f0eeea;
      --paper3: #e8e5de;
      --accent: #c84b31;
      --accent-hover: #b33d25;
      --accent2: #e8956d;
      --green: #2d6a4f;
      --green-light: #e6f9ed;
      --green-text: #1a7a3c;
      --serif: 'DM Serif Display', serif;
      --sans: 'DM Sans', sans-serif;
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e8e5de;
        --ink2: #aaa8c0;
        --ink3: #666688;
        --paper: #1a1a2e;
        --paper2: #222236;
        --paper3: #2e2e48;
        --accent: #e8956d;
        --accent-hover: #d47840;
        --accent2: #c84b31;
        --green: #52b788;
        --green-light: #0a2e18;
        --green-text: #5ecb8a;
      }
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    .app {
      max-width: 580px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .date-label {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: .5rem;
    }

    h1 {
      font-family: var(--serif);
      font-size: 2.8rem;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -.02em;
      color: var(--ink);
      margin-bottom: .75rem;
    }

    h1 em { color: var(--accent); font-style: italic; }

    .progress-bar {
      height: 3px;
      background: var(--paper3);
      border-radius: 2px;
      margin-bottom: .6rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    .stats-row {
      display: flex;
      gap: 2rem;
      padding: .75rem 0 1.5rem;
      border-bottom: .5px solid var(--paper3);
      margin-bottom: 2rem;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-num { font-family: var(--serif); font-size: 1.6rem; font-weight: 400; color: var(--ink); }
    .stat-label { font-size: .68rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink3); }

    /* ── Input Area ── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .input-wrap { flex: 1; }

    #new-task {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--paper3);
      background: transparent;
      font-family: var(--sans);
      font-size: 1rem;
      color: var(--ink);
      padding: .6rem 0;
      outline: none;
      transition: border-color .2s;
    }

    #new-task::placeholder { color: var(--ink3); }
    #new-task:focus { border-bottom-color: var(--accent); }

    .cat-select {
      border: none;
      border-bottom: 1.5px solid var(--paper3);
      background: transparent;
      font-family: var(--sans);
      font-size: .82rem;
      color: var(--ink2);
      padding: .6rem 0;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .add-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, background .15s;
    }

    .add-btn:hover { transform: scale(1.08); background: var(--accent-hover); }
    .add-btn:active { transform: scale(.96); }

    .add-btn svg {
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: .5px solid var(--paper3);
      background: transparent;
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 500;
      color: var(--ink2);
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn:hover:not(.active) { background: var(--paper2); }
    .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* ── Task List ── */
    .tasks { display: flex; flex-direction: column; gap: 6px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--paper);
      border: .5px solid var(--paper3);
      border-radius: var(--radius);
      transition: all .2s;
      position: relative;
    }

    .task-item:hover {
      background: var(--paper2);
      border-color: var(--paper3);
      box-shadow: 0 2px 14px rgba(0,0,0,.05);
      transform: translateY(-1px);
    }

    .task-item.done { opacity: .55; }

    /* Check button */
    .check-wrap { flex-shrink: 0; margin-top: 1px; }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--paper3);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }

    .check-btn:hover { border-color: var(--accent2); }
    .task-item.done .check-btn { background: var(--green); border-color: var(--green); }

    .check-btn svg {
      opacity: 0;
      transition: opacity .15s;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .task-item.done .check-btn svg { opacity: 1; }

    /* Task body */
    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: .96rem;
      line-height: 1.5;
      color: var(--ink);
      transition: all .2s;
      word-break: break-word;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--ink3);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .cat-pill {
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 10px;
    }

    .cat-work     { background: #e8f0fe; color: #1a56b0; }
    .cat-personal { background: #fce8f3; color: #9c1a6e; }
    .cat-health   { background: var(--green-light); color: var(--green-text); }
    .cat-other    { background: var(--paper3); color: var(--ink2); }

    @media (prefers-color-scheme: dark) {
      .cat-work     { background: #0f1f4a; color: #7da8f0; }
      .cat-personal { background: #3a0a2e; color: #e07fc0; }
    }

    .priority-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .p-high { background: #c84b31; }
    .p-med  { background: #e8956d; }
    .p-low  { background: #2d6a4f; }

    .task-time { font-size: .7rem; color: var(--ink3); }

    /* Action buttons (visible on hover) */
    .task-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity .2s;
      flex-shrink: 0;
    }

    .task-item:hover .task-actions { opacity: 1; }

    .icon-btn {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
      color: var(--ink3);
    }

    .icon-btn:hover { background: var(--paper3); color: var(--ink); }
    .icon-btn.del:hover { background: #fce8e8; color: #c84b31; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--ink3);
    }

    .empty-icon {
      font-size: 2.8rem;
      margin-bottom: .75rem;
      opacity: .35;
      display: block;
    }

    .empty p {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-style: italic;
    }

    /* ── Modal ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      padding: 1rem;
    }

    .modal-bg.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--paper);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      width: 100%;
      max-width: 360px;
      border: .5px solid var(--paper3);
      transform: translateY(10px);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }

    .modal-bg.open .modal { transform: translateY(0); }

    .modal h3 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1.25rem;
      color: var(--ink);
    }

    .modal-field { margin-bottom: 1rem; }

    .modal-field label {
      display: block;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: .4rem;
    }

    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      width: 100%;
      border: .5px solid var(--paper3);
      border-radius: 8px;
      background: var(--paper2);
      font-family: var(--sans);
      font-size: .92rem;
      color: var(--ink);
      padding: .6rem .85rem;
      outline: none;
      transition: border-color .2s;
      resize: none;
    }

    .modal-field input:focus,
    .modal-field select:focus,
    .modal-field textarea:focus { border-color: var(--accent); }

    .modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; }

    .btn {
      padding: .58rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--paper2); color: var(--ink2); border: .5px solid var(--paper3); }
    .btn-ghost:hover { background: var(--paper3); }

    /* ── Footer ── */
    .footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: .5px solid var(--paper3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-label { font-size: .78rem; color: var(--ink3); }

    .clear-btn {
      font-size: .78rem;
      font-weight: 500;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      padding: 0;
      transition: opacity .15s;
    }

    .clear-btn:hover { opacity: .7; }
    .clear-btn:disabled { opacity: .3; cursor: default; }

    /* Responsive */
    @media (max-width: 480px) {
      h1 { font-size: 2.2rem; }
      .task-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <div class="date-label" id="date-label"></div>
    <h1>My <em>Tasks</em></h1>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-left">0</span>
        <span class="stat-label">Remaining</span>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="new-task" placeholder="Add a new task…" autocomplete="off" />
      </div>
      <select class="cat-select" id="quick-cat" title="Category">
        <option value="other">Other</option>
        <option value="work">Work</option>
        <option value="personal">Personal</option>
        <option value="health">Health</option>
      </select>
      <button class="add-btn" id="add-btn" title="Add task">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <line x1="7" y1="1" x2="7" y2="13"/>
          <line x1="1" y1="7" x2="13" y2="7"/>
        </svg>
      </button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
      <button class="filter-btn" data-filter="work">Work</button>
      <button class="filter-btn" data-filter="personal">Personal</button>
      <button class="filter-btn" data-filter="health">Health</button>
    </div>

    <!-- Task List -->
    <div class="tasks" id="tasks-list"></div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-label" id="footer-label"></span>
      <button class="clear-btn" id="clear-done-btn">Clear completed</button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-bg" id="edit-modal" role="dialog" aria-modal="true" aria-label="Edit task">
    <div class="modal">
      <h3>Edit Task</h3>
      <div class="modal-field">
        <label for="edit-text">Task</label>
        <textarea id="edit-text" rows="2" placeholder="Task description…"></textarea>
      </div>
      <div class="modal-field">
        <label for="edit-cat">Category</label>
        <select id="edit-cat">
          <option value="other">Other</option>
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="health">Health</option>
        </select>
      </div>
      <div class="modal-field">
        <label for="edit-priority">Priority</label>
        <select id="edit-priority">
          <option value="low">Low</option>
          <option value="med">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="save-edit-btn">Save changes</button>
        <button class="btn btn-ghost" id="cancel-edit-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    /* ─── State ─── */
    const STORAGE_KEY = 'tasks-v2';

    let tasks = loadTasks();
    let filter = 'all';
    let editId = null;
    let nextId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1;

    /* ─── Persistence ─── */
    function loadTasks() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) return JSON.parse(stored);
      } catch (e) { /* ignore */ }
      // Default seed tasks
      return [
        { id: 1, text: 'Review project proposal', cat: 'work', priority: 'high', done: false, ts: Date.now() - 3600000 },
        { id: 2, text: 'Morning run — 5 km', cat: 'health', priority: 'med', done: true,  ts: Date.now() - 7200000 },
        { id: 3, text: 'Call with design team', cat: 'work', priority: 'med', done: false, ts: Date.now() - 1800000 },
        { id: 4, text: 'Grocery shopping', cat: 'personal', priority: 'low', done: false, ts: Date.now() - 900000 },
      ];
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (e) { /* ignore */ }
    }

    /* ─── Helpers ─── */
    function escHtml(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function timeAgo(ts) {
      const diff = (Date.now() - ts) / 1000;
      if (diff < 60)    return 'just now';
      if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    /* ─── Render ─── */
    function render() {
      // Stats
      const total = tasks.length;
      const done  = tasks.filter(t => t.done).length;
      const left  = total - done;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-done').textContent  = done;
      document.getElementById('stat-left').textContent  = left;

      // Progress bar
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';

      // Footer
      document.getElementById('footer-label').textContent =
        total === 0 ? '' : pct + '% complete';
      document.getElementById('clear-done-btn').disabled = done === 0;

      // Visible tasks
      const visible = tasks.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done')   return t.done;
        if (['work', 'personal', 'health'].includes(filter)) return t.cat === filter;
        return true;
      });

      const list = document.getElementById('tasks-list');

      if (visible.length === 0) {
        const msg = filter === 'done' ? 'No completed tasks yet.' :
                    filter === 'active' ? 'All caught up!' : 'Nothing here yet.';
        list.innerHTML = `
          <div class="empty">
            <span class="empty-icon">✓</span>
            <p>${msg}</p>
          </div>`;
        return;
      }

      list.innerHTML = visible.map(t => `
        <div class="task-item${t.done ? ' done' : ''}" id="task-${t.id}" data-id="${t.id}">
          <div class="check-wrap">
            <button class="check-btn js-toggle" data-id="${t.id}" title="${t.done ? 'Mark undone' : 'Mark done'}" aria-label="Toggle task">
              <svg width="10" height="10" viewBox="0 0 10 10">
                <polyline points="1.5,5 4,7.5 8.5,2.5"/>
              </svg>
            </button>
          </div>
          <div class="task-body">
            <div class="task-text">${escHtml(t.text)}</div>
            <div class="task-meta">
              <span class="cat-pill cat-${t.cat}">${t.cat}</span>
              <span class="priority-dot p-${t.priority}" title="Priority: ${t.priority}"></span>
              <span class="task-time">${timeAgo(t.ts)}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="icon-btn js-edit" data-id="${t.id}" title="Edit task" aria-label="Edit task">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 2l2 2-7 7H3v-2l7-7z"/>
              </svg>
            </button>
            <button class="icon-btn del js-delete" data-id="${t.id}" title="Delete task" aria-label="Delete task">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <line x1="2" y1="2" x2="12" y2="12"/>
                <line x1="12" y1="2" x2="2" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    /* ─── Add Task ─── */
    function addTask() {
      const inp  = document.getElementById('new-task');
      const text = inp.value.trim();
      if (!text) { inp.focus(); return; }
      const cat = document.getElementById('quick-cat').value;
      tasks.unshift({ id: nextId++, text, cat, priority: 'med', done: false, ts: Date.now() });
      inp.value = '';
      inp.focus();
      save();
      render();
    }

    document.getElementById('add-btn').addEventListener('click', addTask);
    document.getElementById('new-task').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    /* ─── Delegated Events (toggle / edit / delete) ─── */
    document.getElementById('tasks-list').addEventListener('click', e => {
      const id = parseInt(e.target.closest('[data-id]')?.dataset?.id);
      if (!id) return;

      if (e.target.closest('.js-toggle')) {
        const t = tasks.find(t => t.id === id);
        if (t) { t.done = !t.done; save(); render(); }
      }

      if (e.target.closest('.js-edit')) {
        openEdit(id);
      }

      if (e.target.closest('.js-delete')) {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }
    });

    /* ─── Filters ─── */
    document.querySelector('.filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

    /* ─── Clear Completed ─── */
    document.getElementById('clear-done-btn').addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    });

    /* ─── Edit Modal ─── */
    function openEdit(id) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      editId = id;
      document.getElementById('edit-text').value     = t.text;
      document.getElementById('edit-cat').value      = t.cat;
      document.getElementById('edit-priority').value = t.priority;
      document.getElementById('edit-modal').classList.add('open');
      document.getElementById('edit-text').focus();
    }

    function closeModal() {
      document.getElementById('edit-modal').classList.remove('open');
      editId = null;
    }

    function saveEdit() {
      const t = tasks.find(t => t.id === editId);
      if (!t) return;
      const text = document.getElementById('edit-text').value.trim();
      if (!text) return;
      t.text     = text;
      t.cat      = document.getElementById('edit-cat').value;
      t.priority = document.getElementById('edit-priority').value;
      save();
      closeModal();
      render();
    }

    document.getElementById('save-edit-btn').addEventListener('click', saveEdit);
    document.getElementById('cancel-edit-btn').addEventListener('click', closeModal);

    document.getElementById('edit-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    /* ─── Date Label ─── */
    document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });

    /* ─── Init ─── */
    render();

    // Refresh time-ago every minute
    setInterval(render, 60000);
  </script>
</body>
</html>
